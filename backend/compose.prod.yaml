# Prod override: gunicorn workers, no bind-mounts, healthchecks.
#   docker compose -f compose.yaml -f compose.prod.yaml up -d

services:
  api:
    build:
      target: prod
    environment:
      ENVIRONMENT: prod
      DEBUG: "false"
    command:
      - gunicorn
      - app.main:app
      - --worker-class
      - uvicorn.workers.UvicornWorker
      - --workers
      - "4"
      - --bind
      - "0.0.0.0:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: prod
    command:
      - celery
      - -A
      - app.services.ocr_jobs.workers.celery_app:create_celery_app
      - worker
      - --loglevel=info
      - --concurrency=4
    environment:
      ENVIRONMENT: prod
      OCR_BROKER_URL: redis://redis:6379/0
      OCR_RESULT_BACKEND: redis://redis:6379/1
    restart: unless-stopped
    depends_on:
      - redis

  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

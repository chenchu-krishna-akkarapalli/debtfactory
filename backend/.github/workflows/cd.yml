name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push prod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging  # gate: protected environment with reviewers
    steps:
      - run: echo "TODO(platform): deploy ${{ github.sha }} to staging"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production  # gate: requires manual approval
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - run: echo "TODO(platform): promote ${{ github.sha }} to production"

# Redis configuration — dev-safe defaults.
# Used as the Celery broker/result backend for the OCR jobs service.

bind 0.0.0.0
protected-mode no
port 6379

# Lightweight persistence suitable for development.
appendonly yes
appendfsync everysec

# Cap memory and evict volatile keys first in dev.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Quieter logs in dev.
loglevel notice

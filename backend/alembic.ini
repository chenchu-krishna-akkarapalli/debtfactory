# Alembic configuration.
#
# NOTE: not listed in prompt.md §4, but Alembic cannot run without it. Added so
# the multi-branch, per-service migration scheme in migrations/env.py works. The
# database URL is injected at runtime from app settings (see env.py); the value
# below is only a placeholder for offline tooling.
[alembic]
script_location = migrations
prepend_sys_path = src
sqlalchemy.url = driver://user:pass@localhost/dbname

# One version directory per service branch label so teams never share a head.
version_locations = migrations/versions/rule_engine migrations/versions/auth migrations/versions/domain_logs migrations/versions/ocr_jobs
version_path_separator = space

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Base stack: api + postgres + redis.
# Always combine with one override, e.g.:
#   docker compose -f compose.yaml -f compose.dev.yaml up
name: loan-platform

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
      target: prod
    environment:
      DATABASE_URL: postgresql+asyncpg://loan:loan@db:5432/loan_platform
      OCR_BROKER_URL: redis://redis:6379/0
      OCR_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loan
      POSTGRES_PASSWORD: loan
      POSTGRES_DB: loan_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loan -d loan_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro

volumes:
  pgdata:
